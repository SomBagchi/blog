<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 300" font-family="Roboto, Arial, sans-serif">
  <!-- labels -->
  <text x="196" y="18" font-size="12" fill="#444444" text-anchor="middle">weights move down</text>
  <text x="14" y="178" font-size="12" fill="#444444" text-anchor="middle" transform="rotate(-90 14 178)">activations move right</text>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#828282"/>
    </marker>
  </defs>
  <!-- top arrows -->
  <g stroke="#828282" stroke-width="1.5">
    <line x1="115" y1="28" x2="115" y2="52" marker-end="url(#arr)"/>
    <line x1="169" y1="28" x2="169" y2="52" marker-end="url(#arr)"/>
    <line x1="223" y1="28" x2="223" y2="52" marker-end="url(#arr)"/>
    <line x1="277" y1="28" x2="277" y2="52" marker-end="url(#arr)"/>
  </g>
  <!-- left arrows -->
  <g stroke="#828282" stroke-width="1.5">
    <line x1="34" y1="97" x2="58" y2="97" marker-end="url(#arr)"/>
    <line x1="34" y1="151" x2="58" y2="151" marker-end="url(#arr)"/>
    <line x1="34" y1="205" x2="58" y2="205" marker-end="url(#arr)"/>
    <line x1="34" y1="259" x2="58" y2="259" marker-end="url(#arr)"/>
  </g>
  <!-- 4x4 grid of PEs -->
  <g stroke="rgba(0,0,0,0.3)" fill="#faeef9">
    <rect x="95"  y="77"  width="40" height="40" rx="4"/><rect x="149" y="77"  width="40" height="40" rx="4"/><rect x="203" y="77"  width="40" height="40" rx="4"/><rect x="257" y="77"  width="40" height="40" rx="4"/>
    <rect x="95"  y="131" width="40" height="40" rx="4"/><rect x="149" y="131" width="40" height="40" rx="4"/><rect x="203" y="131" width="40" height="40" rx="4"/><rect x="257" y="131" width="40" height="40" rx="4"/>
    <rect x="95"  y="185" width="40" height="40" rx="4"/><rect x="149" y="185" width="40" height="40" rx="4"/><rect x="203" y="185" width="40" height="40" rx="4"/><rect x="257" y="185" width="40" height="40" rx="4"/>
    <rect x="95"  y="239" width="40" height="40" rx="4"/><rect x="149" y="239" width="40" height="40" rx="4"/><rect x="203" y="239" width="40" height="40" rx="4"/><rect x="257" y="239" width="40" height="40" rx="4"/>
  </g>
  <!-- MAC labels in first row -->
  <g font-size="10" fill="#b509ac" text-anchor="middle">
    <text x="115" y="101">MAC</text><text x="169" y="101">MAC</text><text x="223" y="101">MAC</text><text x="277" y="101">MAC</text>
  </g>
</svg>
